name: Deploy Jekyll site

on:
  push:
    branches:
      - main  # Ce workflow se lancera à chaque poussée sur la branche 'main'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Étape 1 : Construire le site avec Jekyll via Docker
      - name: Build with Jekyll
        uses: Jekyll/docker@master
        with:
          args: jekyll build
        env:
          JEKYLL_ENV: production

      # Étape 2 : Déployer les fichiers générés vers GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site

